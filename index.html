<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Location Map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f7f8fc;
      color: #1a1a2e;
    }

    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ── Header ── */
    .header { margin-bottom: 18px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
    .header .subtitle { font-size: 13px; color: #7a7f9a; margin-top: 4px; }
    .stat-pill {
      display: inline-block; background: #e8eeff; color: #3b5bdb;
      font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-right: 6px;
    }

    /* ── Legend ── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      margin-bottom: 18px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Layout ── */
    .map-layout { display: flex; gap: 16px; align-items: flex-start; }

    /* ── Map ── */
    #map-container { flex: 1; position: relative; background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
    svg.us-map { display: block; width: 100%; height: auto; }

    .state {
      fill: #e8edf5;
      stroke: #fff;
      stroke-width: 0.7;
      cursor: default;
      transition: fill 0.15s;
    }
    .state.has-employees {
      cursor: pointer;
    }
    .state.has-employees:hover { stroke: #333; stroke-width: 1.5; filter: brightness(1.08); }
    .state.active-state { stroke: #1a1a2e !important; stroke-width: 2 !important; }

    /* ── Tooltip ── */
    .tooltip {
      position: absolute;
      background: #1a1a2e;
      color: #fff;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 12.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      max-width: 240px;
      z-index: 20;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .tooltip h3 {
      font-size: 13px; font-weight: 700; margin-bottom: 7px;
      padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .tooltip .t-emp { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
    .tooltip .t-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .tooltip .t-name { font-size: 12px; font-weight: 500; }
    .tooltip .t-dept { font-size: 10px; color: rgba(255,255,255,0.6); }

    /* ── Sidebar ── */
    .sidebar { width: 270px; flex-shrink: 0; }
    .sidebar-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 18px; min-height: 240px;
    }
    .sidebar-card h2 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; }
    .sidebar-placeholder { color: #aaa; font-size: 13px; text-align: center; padding: 36px 10px; line-height: 1.6; }
    .sidebar-placeholder .arrow { font-size: 24px; display: block; margin-bottom: 8px; }
    #sidebar-employees { max-height: 440px; overflow-y: auto; }

    /* ── Employee card ── */
    .emp-card {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 9px;
      margin-bottom: 5px; background: #f7f8fc;
      transition: background 0.1s;
    }
    .emp-card:hover { background: #eef0f8; }
    .emp-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .emp-name { font-size: 13px; font-weight: 600; color: #1a1a2e; line-height: 1.2; }
    .emp-dept { font-size: 11px; color: #7a7f9a; margin-top: 1px; }

    /* ── Heatmap legend ── */
    .heat-legend {
      display: flex; align-items: center; gap: 6px; margin-top: 12px; margin-bottom: 18px;
      font-size: 11px; color: #7a7f9a;
    }
    .heat-bar {
      width: 120px; height: 10px; border-radius: 5px;
      background: linear-gradient(to right, #dbeeff, #1a5fc8);
    }

    /* ── Global section ── */
    .global-section { margin-top: 28px; }
    .global-section h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; }
    .global-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

    .region-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 16px;
    }
    .region-header {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid #f0f1f6;
    }
    .region-flag { font-size: 20px; }
    .region-name { font-size: 14px; font-weight: 700; color: #1a1a2e; flex: 1; }
    .count-badge {
      background: #e8eeff; color: #3b5bdb;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
    }

    /* ── US State count footer ── */
    .state-count-bar {
      margin-top: 10px; font-size: 11px; color: #aaa;
      text-align: center; padding: 6px 0;
    }

    /* scrollbar */
    #sidebar-employees::-webkit-scrollbar { width: 4px; }
    #sidebar-employees::-webkit-scrollbar-track { background: transparent; }
    #sidebar-employees::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    @media (max-width: 720px) {
      .map-layout { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🗺️ Team Locations</h1>
    <p class="subtitle">
      <span class="stat-pill" id="us-count">—</span> US employees &nbsp;·&nbsp;
      <span class="stat-pill" id="intl-count">—</span> International &nbsp;·&nbsp;
      <span id="total-count">—</span> total across <span id="region-count">—</span> states &amp; regions
    </p>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Heatmap scale -->
  <div class="heat-legend">
    <span>Fewer employees</span>
    <div class="heat-bar"></div>
    <span>More employees</span>
  </div>

  <!-- Map + Sidebar -->
  <div class="map-layout">
    <div id="map-container">
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-card">
        <h2 id="sidebar-title">Click a State</h2>
        <div class="sidebar-placeholder" id="sidebar-placeholder">
          <span class="arrow">👆</span>
          Click any highlighted state on the map to see team members
        </div>
        <div id="sidebar-employees"></div>
      </div>
    </div>
  </div>

  <!-- Global section -->
  <div class="global-section" id="global-section"></div>

</div>

];

// ── Dept colours ──
const deptColors = {
  "Engineering":          "#4f8ef7",
  "Sales":                "#f7794f",
  "Customer Success":     "#3ec98e",
  "G&A":                  "#c97af4",
  "Product Management":   "#f5c542",
  "Professional Services":"#4fd4f7",
  "Marketing":            "#f74f8e",
};
const getDeptColor = dept => deptColors[dept] || "#aaa";
const getInitials  = name => name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();

// ── Group data ──
const usByState = {};
const byCountry = {};

employees.forEach(e => {
  if (e.country === "United States") {
    (usByState[e.state] = usByState[e.state] || []).push(e);
  } else {
    if (!byCountry[e.country]) byCountry[e.country] = {};
    (byCountry[e.country][e.state] = byCountry[e.country][e.state] || []).push(e);
  }
});

const usCount   = Object.values(usByState).flat().length;
const intlCount = employees.length - usCount;
const regionCount = Object.keys(usByState).length;

document.getElementById('us-count').textContent   = usCount;
document.getElementById('intl-count').textContent = intlCount;
document.getElementById('total-count').textContent = employees.length;
document.getElementById('region-count').textContent = regionCount + Object.values(byCountry).reduce((a,r)=>a+Object.keys(r).length,0);

// ── Legend ──
const legendEl = document.getElementById('legend');
Object.entries(deptColors).forEach(([dept, color]) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${dept}</span>`;
  legendEl.appendChild(el);
});

// ── State FIPS lookup ──
const stateNameToId = {
  "Alabama":"01","Alaska":"02","Arizona":"04","Arkansas":"05","California":"06",
  "Colorado":"08","Connecticut":"09","Delaware":"10","Florida":"12","Georgia":"13",
  "Hawaii":"15","Idaho":"16","Illinois":"17","Indiana":"18","Iowa":"19","Kansas":"20",
  "Kentucky":"21","Louisiana":"22","Maine":"23","Maryland":"24","Massachusetts":"25",
  "Michigan":"26","Minnesota":"27","Mississippi":"28","Missouri":"29","Montana":"30",
  "Nebraska":"31","Nevada":"32","New Hampshire":"33","New Jersey":"34","New Mexico":"35",
  "New York":"36","North Carolina":"37","North Dakota":"38","Ohio":"39","Oklahoma":"40",
  "Oregon":"41","Pennsylvania":"42","Rhode Island":"44","South Carolina":"45",
  "South Dakota":"46","Tennessee":"47","Texas":"48","Utah":"49","Vermont":"50",
  "Virginia":"51","Washington":"53","West Virginia":"54","Wisconsin":"55","Wyoming":"56",
  "District of Columbia":"11"
};
const idToName = Object.fromEntries(Object.entries(stateNameToId).map(([k,v])=>[v,k]));

// ── Build SVG map ──
const mapContainer = document.getElementById('map-container');
const tooltip      = document.getElementById('tooltip');
const W = 960, H = 600;

const svg = d3.select('#map-container').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('class', 'us-map');

const projection = d3.geoAlbersUsa().scale(1280).translate([W/2, H/2]);
const path = d3.geoPath().projection(projection);

const maxEmp = Math.max(...Object.values(usByState).map(v=>v.length));
const colorScale = d3.scaleSequential()
  .domain([0, maxEmp])
  .interpolator(d3.interpolate("#c8dcf8", "#1a5fc8"));

let activeStateName = null;

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
  const features = topojson.feature(us, us.objects.states).features;

  svg.selectAll('.state')
    .data(features)
    .enter()
    .append('path')
    .attr('class', d => {
      const nm = idToName[String(d.id).padStart(2,'0')];
      return 'state' + (usByState[nm] ? ' has-employees' : '');
    })
    .attr('d', path)
    .attr('fill', d => {
      const nm = idToName[String(d.id).padStart(2,'0')];
      return usByState[nm] ? colorScale(usByState[nm].length) : '#e8edf5';
    })
    .on('mouseover', function(event, d) {
      const nm = idToName[String(d.id).padStart(2,'0')];
      const emps = usByState[nm];
      if (!emps) return;

      d3.select(this).raise().attr('stroke','#1a1a2e').attr('stroke-width', 1.8);

      const rows = emps.map(e => `
        <div class="t-emp">
          <div class="t-avatar" style="background:${getDeptColor(e.dept)}">${getInitials(e.name)}</div>
          <div><div class="t-name">${e.name}</div><div class="t-dept">${e.dept}</div></div>
        </div>`).join('');
      tooltip.innerHTML = `<h3>${nm} &nbsp;·&nbsp; ${emps.length} employee${emps.length>1?'s':''}</h3>${rows}`;
      tooltip.style.opacity = '1';
    })
    .on('mousemove', function(event) {
      const rect = mapContainer.getBoundingClientRect();
      let x = event.clientX - rect.left + 14;
      let y = event.clientY - rect.top - 12;
      if (x + 250 > rect.width)  x -= 260;
      if (y + tooltip.offsetHeight > rect.height) y -= tooltip.offsetHeight + 10;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    })
    .on('mouseout', function(event, d) {
      const nm = idToName[String(d.id).padStart(2,'0')];
      if (nm !== activeStateName) {
        d3.select(this).attr('stroke','#fff').attr('stroke-width', 0.7);
      }
      tooltip.style.opacity = '0';
    })
    .on('click', function(event, d) {
      const nm = idToName[String(d.id).padStart(2,'0')];
      if (!usByState[nm]) return;

      // reset all borders
      svg.selectAll('.state').attr('stroke','#fff').attr('stroke-width', 0.7);
      // highlight clicked
      d3.select(this).raise().attr('stroke','#1a1a2e').attr('stroke-width', 2.5);
      activeStateName = nm;
      renderSidebar(nm, usByState[nm]);
    });

  // Draw state borders on top
  svg.append('path')
    .datum(topojson.mesh(us, us.objects.states, (a,b)=>a!==b))
    .attr('fill','none').attr('stroke','#fff').attr('stroke-width', 0.7)
    .attr('d', path);

}).catch(() => {
  mapContainer.innerHTML = '<p style="padding:20px;color:#888">Map failed to load. Please check your internet connection.</p>';
});

// ── Sidebar renderer ──
function renderSidebar(stateName, emps) {
  document.getElementById('sidebar-title').textContent = `${stateName} (${emps.length})`;
  document.getElementById('sidebar-placeholder').style.display = 'none';
  document.getElementById('sidebar-employees').innerHTML = emps
    .sort((a,b) => a.dept.localeCompare(b.dept) || a.name.localeCompare(b.name))
    .map(e => `
      <div class="emp-card">
        <div class="emp-avatar" style="background:${getDeptColor(e.dept)}">${getInitials(e.name)}</div>
        <div>
          <div class="emp-name">${e.name}</div>
          <div class="emp-dept">${e.dept}</div>
        </div>
      </div>`).join('');
}

// ── Global section ──
const countryFlags = { Canada: "🇨🇦", India: "🇮🇳" };
const globalSection = document.getElementById('global-section');

const cards = Object.entries(byCountry)
  .sort(([a],[b]) => a.localeCompare(b))
  .flatMap(([country, regions]) =>
    Object.entries(regions)
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([region, emps]) => `
        <div class="region-card">
          <div class="region-header">
            <span class="region-flag">${countryFlags[country]||'🌐'}</span>
            <span class="region-name">${region}, ${country}</span>
            <span class="count-badge">${emps.length}</span>
          </div>
          ${emps.sort((a,b)=>a.dept.localeCompare(b.dept)||a.name.localeCompare(b.name))
            .map(e => `
              <div class="emp-card">
                <div class="emp-avatar" style="background:${getDeptColor(e.dept)}">${getInitials(e.name)}</div>
                <div>
                  <div class="emp-name">${e.name}</div>
                  <div class="emp-dept">${e.dept}</div>
                </div>
              </div>`).join('')}
        </div>`)
  ).join('');

globalSection.innerHTML = `<h2>🌍 International Team</h2><div class="global-grid">${cards}</div>`;
</script>
</body>
</html>
