
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f8; }
  #topbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border-bottom: 1px solid #e8e8e5; flex-wrap: wrap; }
  #badge { background: #e6f1fb; color: #185fa5; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
  #status { font-size: 13px; color: #888; }
  #map { width: 100%; height: calc(100vh - 90px); }
  #legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 14px; background: #fff; border-top: 1px solid #e8e8e5; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
  .ld { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .leaflet-popup-content strong { font-size: 13px; }
  .leaflet-popup-content span { font-size: 12px; color: #666; display: block; margin-top: 2px; }
</style>
</head>
<body>

<!-- ============================================================
     STEP 1: Replace the value below with your Apps Script URL
     ============================================================ -->
<script>
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";
</script>
<!-- ============================================================ -->

<div id="topbar">
  <span id="badge">Loading…</span>
  <span id="status">Fetching team data…</span>
</div>
<div id="map"></div>
<div id="legend"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DEPT_COLORS = {
  Engineering: '#378ADD', Marketing: '#1D9E75', Sales: '#D85A30',
  Design: '#7F77DD', HR: '#D4537E', Finance: '#BA7517',
  Operations: '#639922', Legal: '#888780', Product: '#E24B4A',
  Other: '#5DCAA5'
};
const usedColors = {};
const extraColors = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780','#E24B4A','#5DCAA5'];
let colorIdx = 0;

function deptColor(d) {
  if (DEPT_COLORS[d]) return DEPT_COLORS[d];
  if (!usedColors[d]) usedColors[d] = extraColors[colorIdx++ % extraColors.length];
  return usedColors[d];
}

const map = L.map('map').setView([25, 10], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

const geoCache = {};
async function geocode(state, country) {
  const key = [state, country].filter(Boolean).join('|');
  if (geoCache[key]) return geoCache[key];
  const q = [state, country].filter(Boolean).join(', ');
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, {
      headers: { 'Accept-Language': 'en' }
    });
    const d = await r.json();
    if (d[0]) { geoCache[key] = { lat: +d[0].lat, lng: +d[0].lon }; return geoCache[key]; }
  } catch(e) {}
  return null;
}

function jitter(coord, i, n) {
  if (n <= 1) return coord;
  const r = 0.05 + 0.025 * Math.floor(i / 8);
  return coord + r * Math.cos(2 * Math.PI * i / n);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setBadge(n) { document.getElementById('badge').textContent = n + ' people'; }

async function renderPeople(data) {
  const people = data.map(r => ({
    name: r['Employee Name'] || '',
    state: r['State'] || '',
    country: r['Country'] || '',
    dept: r['Department'] || 'Other'
  })).filter(p => p.name && p.country);

  setBadge(people.length);
  setStatus('Geocoding locations…');

  const groups = {};
  people.forEach(p => {
    const k = [p.state, p.country].join('|');
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });

  let done = 0, total = Object.keys(groups).length;
  for (const [k, grp] of Object.entries(groups)) {
    const geo = await geocode(grp[0].state, grp[0].country);
    if (geo) {
      grp.forEach((p, i) => {
        const lat = jitter(geo.lat, i, grp.length);
        const lng = jitter(geo.lng, i, grp.length);
        const c = deptColor(p.dept);
        const initials = p.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        const icon = L.divIcon({
          className: '',
          html: `<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.25);cursor:pointer">${initials}</div>`,
          iconSize: [30, 30], iconAnchor: [15, 15]
        });
        const m = L.marker([lat, lng], { icon }).addTo(map);
        const loc = [p.state, p.country].filter(Boolean).join(', ');
        m.bindPopup(`<strong>${p.name}</strong><span>${p.dept}</span><span>${loc}</span>`);
      });
    }
    done++;
    setStatus(`Geocoding… ${done}/${total} locations`);
    await new Promise(r => setTimeout(r, 110));
  }

  setStatus('Zoom in to spread clustered pins · Click any pin for details');
  renderLegend(people);
}

function renderLegend(people) {
  const depts = [...new Set(people.map(p => p.dept))].sort();
  document.getElementById('legend').innerHTML = depts.map(d =>
    `<div class="li"><span class="ld" style="background:${deptColor(d)}"></span>${d}</div>`
  ).join('');
}

async function init() {
  if (!SCRIPT_URL || SCRIPT_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    setStatus('⚠️ Open this file and replace SCRIPT_URL with your Apps Script Web App URL.');
    document.getElementById('badge').textContent = 'Not connected';
    return;
  }
  try {
    setStatus('Fetching team data…');
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) {
      setStatus('No data found. Check your Apps Script and sheet headers.');
      return;
    }
    renderPeople(data);
  } catch(e) {
    setStatus('Error loading data: ' + e.message + '. Make sure Apps Script is deployed with access: Anyone.');
  }
}

init();
</script>
</body>
</html>
